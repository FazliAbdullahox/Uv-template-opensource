<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto-Launch Proxy</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
</head>
<body style="background-color: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 20%;">
    
    <h2 id="status">Loading your link...</h2>

    <script>
        // --- PUT YOUR LINK HERE ---
        const targetUrl = "https://example.com"; 
        
        async function launchProxy() {
            const statusText = document.getElementById("status");

            if (!("serviceWorker" in navigator)) {
                statusText.innerText = "Error: Browser doesn't support Service Workers.";
                return;
            }

            try {
                // FIXED: Now looking for the service worker in the root folder
                await navigator.serviceWorker.register("/sw.js", { scope: __uv$config.prefix });
                
                statusText.innerText = "Connecting to proxy...";
                
                // Encode and auto-redirect
                const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
                window.location.href = proxiedUrl;
                
            } catch (error) {
                statusText.innerText = "Error: Still can't find sw.js. It might be named differently in your repo.";
            }
        }

        launchProxy();
    </script>
</body>
</html>
