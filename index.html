<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto-Launch Proxy</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
</head>
<body style="background-color: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 20%;">
    
    <h2>Loading your link...</h2>

    <script>
        // --- PUT YOUR LINK HERE ---
        const targetUrl = "https://cine-hub-blocked.netlify.app"; 
        
        if ("serviceWorker" in navigator) {
            // Register the UV service worker
            navigator.serviceWorker.register("/uv/sw.js", {
                scope: __uv$config.prefix
            }).then(() => {
                // Encode the link and auto-redirect
                const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
                window.location.href = proxiedUrl;
            }).catch((error) => {
                console.error("Service Worker failed to register:", error);
            });
        } else {
            alert("Your browser doesn't support Service Workers.");
        }
    </script>
</body>
</html>
